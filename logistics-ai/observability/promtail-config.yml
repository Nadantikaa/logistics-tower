server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(logistics-ai-backend|logistics-ai-worker|logistics-backend)'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
        regex: '/(.*)'
        replacement: '$1'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream
      - source_labels: ['__meta_docker_container_name']
        target_label: job
        regex: '/(.*)'
        replacement: '$1'
      - replacement: /var/lib/docker/containers/*/*-json.log
        target_label: __path__
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            timestamp: timestamp
            log_level: log_level
            endpoint: endpoint
            shipment_id: shipment_id
            method: method
            status_code: status_code
            logger: logger
            request_id: request_id
      - labels:
          log_level:
          endpoint:
          shipment_id:
          method:
          status_code:
