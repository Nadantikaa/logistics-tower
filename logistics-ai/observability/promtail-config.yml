server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: logistics-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: logistics-backend
          service: logistics-ai-backend
          __path__: /var/log/logistics-ai/backend.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            log_level: log_level
            endpoint: endpoint
            shipment_id: shipment_id
            method: method
            status_code: status_code
            logger: logger
            request_id: request_id
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          log_level:
          endpoint:
          shipment_id:
          method:
          status_code:
