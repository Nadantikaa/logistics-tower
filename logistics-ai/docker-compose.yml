services:
  backend:
    build:
      context: ./backend
    container_name: logistics-ai-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE_PATH: ${LOG_FILE_PATH:-/app/logs/backend.log}
      LOG_SERVICE_NAME: ${LOG_SERVICE_NAME:-logistics-ai-backend}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - backend_logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: logistics-ai-frontend
    environment:
      VITE_API_BASE: http://127.0.0.1:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: logistics-ai-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: logistics-ai-promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      backend:
        condition: service_started
      loki:
        condition: service_healthy
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - backend_logs:/var/log/logistics-ai:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: logistics-ai-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

volumes:
  backend_logs:
  loki_data:
  grafana_data:
