version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: logistics-ai-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: logistics-ai-frontend
    environment:
      VITE_API_BASE: http://127.0.0.1:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
